<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title><!-- TITLE --></title>
  <style>
    :root {
      --bg: #ffffff; --fg: #1f2328; --muted: #59636e; --border: #d1d9e0;
      --accent: #0969da; --accent-bg: #ddf4ff; --code-bg: #f6f8fa;
      --warn-bg: #fff8c5; --warn-border: #d4a72c; --green: #1a7f37; --red: #cf222e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117; --fg: #e6edf3; --muted: #9198a1; --border: #30363d;
        --accent: #4493f8; --accent-bg: #121d2f; --code-bg: #161b22;
        --warn-bg: #2d2611; --warn-border: #bb8009; --green: #3fb950; --red: #f85149;
      }
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      line-height: 1.7; margin: 0; padding: 2.5rem 1.5rem;
    }
    main { max-width: 940px; margin: 0 auto; }
    h1 { font-size: 1.7rem; line-height: 1.3; border-bottom: 2px solid var(--border); padding-bottom: 0.6rem; }
    h2 { font-size: 1.3rem; margin-top: 2.6rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
    h2 .num {
      display: inline-block; min-width: 1.8rem; height: 1.8rem; line-height: 1.8rem; text-align: center;
      background: var(--accent); color: #fff; border-radius: 50%; font-size: 0.95rem; margin-right: 0.5rem;
    }
    h3 { font-size: 1.05rem; margin-top: 1.6rem; }
    code {
      background: var(--code-bg); padding: 0.15em 0.4em; border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 0.86em;
    }
    pre {
      background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 1rem; overflow-x: auto; font-size: 0.82rem; line-height: 1.55;
    }
    pre code { background: none; padding: 0; }
    a { color: var(--accent); }
    .toc { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem 1.2rem; }
    .toc ol { margin: 0.3rem 0; }
    .callout {
      border: 1px solid var(--border); border-left: 4px solid var(--accent);
      background: var(--accent-bg); border-radius: 8px; padding: 0.9rem 1.1rem; margin: 1.2rem 0;
    }
    .callout.warn { border-left-color: var(--warn-border); background: var(--warn-bg); }
    .callout h3 { margin-top: 0; }
    ul, ol { padding-left: 1.4rem; }
    li { margin: 0.35rem 0; }
    .file { font-family: ui-monospace, monospace; font-size: 0.8rem; color: var(--muted); }
    .tag {
      display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 0.1em 0.55em;
      border-radius: 999px; vertical-align: middle; margin-left: 0.4rem;
    }
    .tag.new { background: var(--green); color: #fff; }
    .tag.edit { background: var(--accent); color: #fff; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.87rem; }
    th, td { border: 1px solid var(--border); padding: 0.5rem 0.7rem; text-align: left; vertical-align: top; }
    th { background: var(--code-bg); }
    .muted { color: var(--muted); }
    .ok { color: var(--green); font-weight: 600; }
    .no { color: var(--red); font-weight: 600; }
    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .meta { font-size: 0.85rem; color: var(--muted); margin-top: -0.4rem; }
  </style>
</head>
<body>
<main>
  <!-- CONTENT -->
</main>
</body>
</html>
