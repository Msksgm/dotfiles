presets:
  claude-code:
    allow:
      - "."
      - path: "/tmp"
        eval-symlinks: true
      - "$HOME/.npm"
      - "$HOME/.npm-global"
      - "$HOME/.gradle"
      # Knative 用
      - "$HOME/.konan"
      - "$HOME/.crit"
      - "$HOME/.agents"
      - "$HOME/.claude"
      - "$HOME/.claude.json"
      - "$HOME/.config/claude"
      - "$HOME/.mcp-auth"
      - "$HOME/.m2"
      - "$HOME/.rustup"
      - "$HOME/.ansible/tmp"
      - "/dev/tty"
      - "/dev/ttys*"
      # Claude Code で nvim で操作するときのために必要
      - "$HOME/.local/state/nvim"
      - "$HOME/.local/share/nvim"
      # Claude Code の MCP 認証ログを残す場所。MCP系でエラーが出る可能性があるため追加
      - "$HOME/Library/Caches/claude-cli-nodejs"
      # uv 実行時のキャッシュへの書き込み権限
      - "$HOME/.cache"
    allow-keychain: true
    allow-git: true

auto-presets:
  - command: claude
    presets:
      - claude-code
